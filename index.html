<!DOCTYPE html>
<html lang="de" data-theme="obsidian">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Hermes</title>
<meta name="theme-color" content="#0A0A0A" id="themeColor" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hermes" />
<link rel="manifest" href="manifest.json" />
<link id="appleicon" rel="apple-touch-icon" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root[data-theme="obsidian"]{--bg:#0A0A0A;--surface:#151515;--surface2:#1E1E1E;--line:#2C2C2C;--text:#F2F0EB;--muted:#8B887F;--hair:#242424;--inv-bg:#F2F0EB;--inv-fg:#0A0A0A;}
:root[data-theme="marmor"]{--bg:#F3F1EB;--surface:#FCFBF7;--surface2:#EAE7DE;--line:#D6D1C4;--text:#16130C;--muted:#6B6658;--hair:#E2DDD0;--inv-bg:#16130C;--inv-fg:#F3F1EB;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;background:var(--bg);}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;padding-bottom:calc(70px + env(safe-area-inset-bottom));}
.hd{padding:calc(18px + env(safe-area-inset-top)) 20px 14px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;}
.wordmark{font-weight:800;font-size:24px;letter-spacing:-0.5px;}
.tagline{font-size:12px;color:var(--muted);}
.main{flex:1;padding:14px;}
.stack{display:flex;flex-direction:column;gap:12px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;}
.eyebrow{font-weight:700;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.body{font-size:15px;line-height:1.5;margin:0;}
.muted{color:var(--muted);font-size:14px;line-height:1.45;}
.sm{font-size:13px;}
.row{display:flex;align-items:center;gap:8px;}
.between{display:flex;justify-content:space-between;align-items:center;gap:8px;}
h3.sec{font-size:15px;font-weight:700;margin:2px 0 0;}

.shiftrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.chip{background:transparent;border:1px solid var(--line);color:var(--text);font-weight:600;font-size:14px;padding:12px 2px;border-radius:10px;cursor:pointer;transition:.12s;}
.chip--on{background:var(--inv-bg);color:var(--inv-fg);border-color:var(--inv-bg);}

.hero{border-left:4px solid var(--text);}
.hero-tag{font-weight:800;font-size:22px;}
.hero-when{font-weight:600;font-size:15px;margin-top:2px;}
.hero-note{font-size:14px;line-height:1.5;color:var(--muted);margin:8px 0 14px;}
.hero-rest{font-weight:600;color:var(--muted);}
.hero--empty{border-left:1px dashed var(--line);color:var(--muted);font-size:15px;line-height:1.5;}

.btn{width:100%;background:var(--inv-bg);color:var(--inv-fg);border:none;border-radius:10px;font-weight:700;font-size:15px;padding:14px;cursor:pointer;transition:.12s;}
.btn:active{opacity:.82;}.btn:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--text);}
.btn-sm{padding:10px;font-size:13px;}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{display:flex;flex-direction:column;gap:4px;}
.stat-num{font-weight:800;font-size:34px;line-height:.95;}
.stat-num .u{font-size:15px;color:var(--muted);margin-left:2px;font-weight:600;}
.stat-lbl{font-size:13px;color:var(--muted);line-height:1.2;}

.dayswitch{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.daybtn{flex:1;min-width:70px;background:transparent;border:1px solid var(--line);color:var(--text);font-weight:600;font-size:14px;padding:11px 6px;border-radius:10px;cursor:pointer;position:relative;}
.daybtn--on{background:var(--inv-bg);color:var(--inv-fg);border-color:var(--inv-bg);}
.dot{position:absolute;top:3px;right:6px;font-size:9px;font-weight:600;}

.progress{height:4px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.progress-bar{height:100%;background:var(--text);transition:width .25s;}

.ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.ex-name{font-weight:700;font-size:17px;}
.ex-target{font-size:13px;color:var(--muted);white-space:nowrap;}
.lastline{font-size:13px;color:var(--muted);margin-top:3px;}
.lastline b{color:var(--text);}
details.steps{margin-top:8px;}
details.steps summary{font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;list-style:none;text-transform:uppercase;letter-spacing:.5px;}
details.steps summary::-webkit-details-marker{display:none;}
details.steps summary::before{content:"＋ ";}
details.steps[open] summary::before{content:"− ";}
details.steps ol{margin:8px 0 0;padding-left:18px;}
details.steps li{font-size:13px;line-height:1.5;color:var(--text);margin-bottom:3px;}
.sethead{display:grid;grid-template-columns:26px 1fr 1fr 42px;gap:8px;margin:12px 0 6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.sethead span{text-align:center;}.sethead span:first-child{text-align:left;}
.setrow{display:grid;grid-template-columns:26px 1fr 1fr 42px;gap:8px;align-items:center;margin-bottom:7px;}
.setrow--done{opacity:.5;}
.setnum{font-weight:600;color:var(--muted);text-align:center;}
.inp{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px 8px;font-size:16px;text-align:center;width:100%;font-family:inherit;}
.inp:focus{outline:none;border-color:var(--text);}.inp:disabled{opacity:.35;}
.check{background:transparent;border:1px solid var(--line);color:transparent;border-radius:9px;height:42px;cursor:pointer;font-size:17px;transition:.1s;}
.check--on{background:var(--inv-bg);border-color:var(--inv-bg);color:var(--inv-fg);}
.restbtn{margin-top:10px;background:transparent;border:1px dashed var(--line);color:var(--muted);font-size:12px;font-weight:600;padding:9px;border-radius:9px;cursor:pointer;width:100%;}
.notearea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:12px;font-family:inherit;font-size:15px;resize:vertical;min-height:52px;}
.notearea:focus{outline:none;border-color:var(--text);}
.tip{font-size:13px;color:var(--muted);line-height:1.45;text-align:center;margin:2px 6px 0;}
.done{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:28px 18px;}
.done-check{width:56px;height:56px;border-radius:50%;background:var(--inv-bg);color:var(--inv-fg);font-size:28px;display:flex;align-items:center;justify-content:center;}
.done-title{font-weight:800;font-size:20px;}

.weighrow{display:flex;align-items:center;gap:8px;}
.inp--big{font-size:18px;flex:1;text-align:left;}
.kglabel{color:var(--muted);}
.addbtn{background:var(--inv-bg);color:var(--inv-fg);border:none;border-radius:9px;padding:13px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.trend{margin-top:10px;font-weight:700;font-size:15px;text-align:center;}
.axis{fill:var(--muted);font-size:10px;}
.bwlist{margin-top:14px;border-top:1px solid var(--hair);}
.bwitem{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--hair);font-size:14px;}
.del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding:2px 8px;}

/* nutrient bars */
.nut{margin-bottom:11px;}
.nut-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.nut-top b{font-weight:600;}
.nut-val{color:var(--muted);}
.nut-bar{height:6px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.nut-fill{height:100%;background:var(--text);border-radius:4px;}
.nut-fill.over{background:var(--muted);}
.kcal-big{text-align:center;padding:6px 0 4px;}
.kcal-big .n{font-weight:800;font-size:40px;line-height:1;}
.kcal-big .l{color:var(--muted);font-size:13px;margin-top:2px;}
.wkchart{position:relative;display:flex;align-items:flex-end;gap:6px;height:100px;margin-top:4px;}
.wkbar{flex:1;background:var(--surface2);border-radius:4px 4px 0 0;min-height:2px;}
.wkbar--today{background:var(--text);}
.wkbar--empty{background:var(--hair);}
.wktgt{position:absolute;left:0;right:0;border-top:1px dashed var(--muted);z-index:1;}
.wklbls{display:flex;gap:6px;margin-top:5px;}
.wklbls span{flex:1;text-align:center;font-size:10px;color:var(--muted);}

.foodentry{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--hair);}
.foodentry .fn{font-size:14px;font-weight:500;}
.foodentry .fd{font-size:12px;color:var(--muted);}
.water-btns{display:flex;gap:8px;}
.water-btns button{flex:1;background:transparent;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px;font-weight:600;font-size:14px;cursor:pointer;}

/* food/exercise picker */
.searchbar{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;margin-bottom:12px;}
.searchbar:focus{outline:none;border-color:var(--text);}
.grouphdr{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:14px 0 6px;}
.pick-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--hair);}
.pick-left{min-width:0;}
.pick-item .pn{font-size:14px;font-weight:500;}
.pick-item .pmeta{font-size:12px;color:var(--muted);}
.portrow{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.portchip{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:11px;font-weight:600;padding:5px 8px;border-radius:7px;cursor:pointer;font-family:inherit;}
.portchip:active{background:var(--surface2);}
.pick-add{background:var(--inv-bg);color:var(--inv-fg);border:none;border-radius:8px;width:34px;height:34px;font-size:20px;cursor:pointer;flex:none;}
.gramrow{display:flex;gap:6px;align-items:center;flex:none;}
.gram-inp{width:66px;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 6px;font-size:14px;text-align:center;font-family:inherit;}
.exlib-item{padding:11px 0;border-bottom:1px solid var(--hair);}

/* editor */
.acc{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface);}
.acc-head{display:flex;justify-content:space-between;align-items:center;padding:15px 16px;cursor:pointer;font-weight:700;font-size:14px;}
.acc-head .ar{color:var(--muted);}
.acc-body{padding:0 16px 16px;}
.editday{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;}
.editday-top{display:flex;gap:6px;align-items:center;margin-bottom:10px;}
.exrow-ed{display:grid;grid-template-columns:1fr 40px 60px;gap:6px;margin-bottom:6px;align-items:center;}
.exrow-ed2{display:flex;gap:6px;margin-bottom:12px;align-items:center;}
.minirow{display:flex;gap:6px;align-items:center;}
.sel{background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:11px 6px;font-family:inherit;font-size:14px;}
.iconbtn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:14px;flex:none;display:flex;align-items:center;justify-content:center;}
.iconbtn:disabled{opacity:.3;}
.lbl-sm{font-size:12px;font-weight:600;color:var(--muted);display:block;margin:14px 0 6px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.field label{font-size:13px;font-weight:600;color:var(--muted);}
.stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden;width:fit-content;}
.stepper button{background:transparent;border:none;color:var(--text);width:40px;height:40px;font-size:20px;cursor:pointer;}
.stepper .val{min-width:74px;text-align:center;font-weight:700;font-size:15px;}
.histitem{border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.histitem .hd-l{font-weight:600;font-size:14px;}
.histitem .hd-d{font-size:12px;color:var(--muted);}
.dataarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:10px;font-family:monospace;font-size:11px;min-height:80px;resize:vertical;}
.themebtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

.restbar{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--inv-bg);color:var(--inv-fg);display:none;align-items:center;gap:12px;padding:12px 18px;}
.restbar.on{display:flex;}
.restbar .rt{font-weight:800;font-size:20px;min-width:58px;}
.restbar .rl{font-size:12px;font-weight:600;flex:1;text-transform:uppercase;letter-spacing:.5px;}
.restbar button{background:transparent;border:1px solid var(--inv-fg);color:var(--inv-fg);border-radius:8px;padding:7px 11px;font-weight:600;font-size:12px;cursor:pointer;}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:grid;grid-template-columns:repeat(5,1fr);background:var(--surface);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);}
.navbtn{background:none;border:none;color:var(--muted);font-weight:600;font-size:11px;padding:14px 0 16px;cursor:pointer;border-top:2px solid transparent;margin-top:-1px;}
.navbtn--on{color:var(--text);border-top-color:var(--text);}
.scan-added{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:13px;line-height:1.4;margin-bottom:12px;}
.scan{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));}
.scan.on{display:flex;}
.scanbox{position:relative;width:100%;max-width:420px;aspect-ratio:4/3;background:#111;border-radius:14px;overflow:hidden;}
#scanvideo{width:100%;height:100%;object-fit:cover;}
.scan-frame{position:absolute;inset:22% 12%;border:2px solid rgba(255,255,255,.85);border-radius:10px;}
.scan-status{color:#fff;font-size:14px;text-align:center;min-height:20px;max-width:420px;line-height:1.4;}
.scan-actions{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px;}
.scan-row{display:flex;gap:8px;}
.scan-input{flex:1;background:#151515;border:1px solid #333;color:#fff;border-radius:9px;padding:12px;font-size:16px;font-family:inherit;}
.scan-input:focus{outline:none;border-color:#888;}
.scan-btn{background:#F2F0EB;color:#0A0A0A;border:none;border-radius:9px;padding:12px 16px;font-weight:700;font-size:14px;cursor:pointer;}
.scan-btn.ghost{background:transparent;color:#fff;border:1px solid #444;width:100%;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <header class="hd"><span class="wordmark">Hermes</span><span class="tagline">Training &amp; Ernährung</span></header>
  <main class="main" id="main"></main>
  <div class="restbar" id="restbar"></div>
  <nav class="nav" id="nav"></nav>
</div>
<div class="scan" id="scanoverlay">
  <div class="scanbox"><video id="scanvideo" playsinline muted></video><div class="scan-frame"></div></div>
  <div class="scan-status" id="scanStatus">Barcode ruhig vor die Kamera halten …</div>
  <div class="scan-actions">
    <div class="scan-row"><input class="scan-input" id="scanManual" type="number" inputmode="numeric" placeholder="oder Barcode-Nummer eintippen"><button class="scan-btn" id="scanSearchBtn">Suchen</button></div>
    <button class="scan-btn ghost" id="scanCloseBtn">Abbrechen</button>
  </div>
</div>
<script>
"use strict";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);

/* ---------- Übungs-Bibliothek ---------- */
const EXLIB={
"Beine":[
 ["Kniebeuge","Stange auf dem oberen Rücken, Füße schulterbreit.","Hüfte nach hinten, kontrolliert absenken bis Oberschenkel parallel.","Über die Fersen hochdrücken, Rumpf fest."],
 ["Beinpresse","In den Sitz, Füße schulterbreit auf die Platte.","Knie kontrolliert Richtung Brust beugen (~90°).","Ohne Schwung wegdrücken, Knie nicht ganz durchstrecken."],
 ["Ausfallschritte","Großer Schritt nach vorn, Oberkörper aufrecht.","Hinteres Knie Richtung Boden senken.","Über die vordere Ferse hochdrücken, Seite wechseln."],
 ["Rumän. Kreuzheben","Stange/KH vor den Oberschenkeln, leichte Kniebeuge.","Hüfte nach hinten schieben, Rücken gerade, Stange nah am Bein.","Bei Dehnung in den Beinbeugern stoppen, Hüfte nach vorn strecken."],
 ["Beinbeuger (Maschine)","Bäuche der Beine auf die Rolle, Beine gestreckt.","Fersen zum Gesäß ziehen.","Langsam zurücklassen."],
 ["Beinstrecker (Maschine)","Sitzen, Rolle über den Knöcheln.","Beine gegen den Widerstand strecken.","Oben kurz halten, langsam ablassen."],
 ["Wadenheben","Ballen auf eine Erhöhung, Fersen frei.","So hoch wie möglich auf die Zehen.","Langsam absenken bis unter Ausgangshöhe."],
],
"Brust":[
 ["Bankdrücken","Auf der Bank, Stange über der Brust, Schulterblätter zusammen.","Kontrolliert zur unteren Brust absenken.","Explosiv nach oben drücken."],
 ["Schrägbankdrücken","Bank auf 30–45°, Stange/KH über oberer Brust.","Zur oberen Brust absenken.","Gerade nach oben drücken."],
 ["Kurzhantel-Bankdrücken","Flach liegen, KH über der Brust.","Tief absenken bis Dehnung, Ellenbogen ~45°.","Zusammen nach oben drücken."],
 ["Liegestütze","Hände etwas breiter als Schultern, Körper gerade.","Brust Richtung Boden senken.","Hochdrücken, Rumpf fest."],
 ["Butterfly / Kabel-Fly","Griffe auf Brusthöhe, leichte Ellenbogenbeugung.","Arme im Bogen vor der Brust zusammenführen.","Langsam öffnen bis Brustdehnung."],
],
"Rücken":[
 ["Latzug","Griff etwas breiter als Schultern, sitzen.","Stange zur oberen Brust ziehen, Ellenbogen nach unten.","Langsam nach oben lassen."],
 ["Klimmzüge","An die Stange hängen, Griff schulterbreit+.","Brust zur Stange ziehen.","Kontrolliert ganz ablassen."],
 ["Rudern (Kabel)","Sitzen, Griff mit gestreckten Armen.","Zum Bauch ziehen, Schulterblätter zusammen.","Langsam zurückführen."],
 ["Langhantelrudern","Hüfte gebeugt, Rücken gerade, Stange hängend.","Zum unteren Bauch ziehen.","Kontrolliert ablassen."],
 ["Kurzhantelrudern (einarmig)","Ein Knie/Hand auf Bank, KH hängt.","KH zur Hüfte ziehen, Ellenbogen eng.","Langsam senken, dann Seite wechseln."],
],
"Schultern":[
 ["Schulterdrücken (KH)","Sitzend, KH auf Schulterhöhe.","Über den Kopf drücken bis fast gestreckt.","Kontrolliert absenken."],
 ["Seitheben","KH neben dem Körper, leichte Ellenbogenbeugung.","Arme seitlich bis Schulterhöhe heben.","Langsam senken, kein Schwung."],
 ["Frontheben","KH vor den Oberschenkeln.","Arm gerade nach vorn bis Schulterhöhe.","Langsam ablassen."],
 ["Reverse Fly","Vorgebeugt, KH hängen, leichte Beugung.","Arme seitlich nach hinten/oben führen.","Schulterblätter zusammen, langsam zurück."],
],
"Arme":[
 ["Bizeps-Curls (KH)","KH neben dem Körper, Handflächen vorn.","Ohne Schwung zur Schulter curlen.","Langsam absenken."],
 ["Hammer-Curls","KH mit Handflächen zueinander.","Zur Schulter curlen.","Langsam senken."],
 ["Langhantel-Curls","Stange schulterbreit, Ellenbogen am Körper.","Zur Brust curlen.","Kontrolliert ablassen."],
 ["Trizeps-Drücken (Kabel)","Seil/Stange oben, Ellenbogen eng am Körper.","Nach unten strecken bis Arme gerade.","Langsam nach oben lassen."],
 ["Trizeps-Dips","Hände auf Bank hinter dir, Beine vorn.","Körper absenken, Ellenbogen nach hinten.","Hochdrücken."],
],
"Core":[
 ["Plank","Unterarme und Zehen am Boden, Körper gerade.","Bauch und Po anspannen.","Position halten, nicht durchhängen."],
 ["Crunches","Rücklings, Knie gebeugt, Hände an den Schläfen.","Schulterblätter vom Boden heben.","Langsam ablassen."],
 ["Beinheben","Rücklings, Beine gestreckt.","Beine gerade nach oben heben.","Langsam senken, ohne abzulegen."],
 ["Russian Twist","Sitzend, Oberkörper leicht zurück, Füße frei.","Gewicht von Seite zu Seite drehen.","Kontrolliert, Rumpf fest."],
 ["Mountain Climbers","Liegestützposition.","Knie abwechselnd schnell zur Brust ziehen.","Rücken gerade halten."],
],
"Cardio":[
 ["Joggen / Laufband","Lockeres Tempo, aufrechte Haltung.","20–30 Min gleichmäßig.","Nach Gefühl steigern."],

/* focus: "aufbau" (Muskelaufbau) | "fettabbau" | "beides". Cardio-Finisher bei Fettabbau. */
function generatePlan(focus,days){
 const d=Math.min(4,Math.max(2,days|0)),tpl=PLAN_TEMPLATES[d]||PLAN_TEMPLATES[2];
 const reps=focus==="fettabbau"?"12–15":focus==="beides"?"10–12":"8–12";
 const sets=focus==="aufbau"?3:3;
 const cardio=focus==="fettabbau"?"alle":focus==="beides"?"halb":"keine";
 const mk=(name,st,rp,unit)=>({id:uid(),name,sets:st,reps:rp,unit,steps:findExSteps(name)});
 return tpl.map((day,di)=>{
  const exs=day.ex.map(name=>name==="Plank"?mk(name,3,"30–45","s"):mk(name,sets,reps,"kg"));
  if(cardio==="alle"||(cardio==="halb"&&di%2===1))exs.push(mk("Ergometer / Fahrrad",1,"15–20","min"));
  return {id:uid(),label:day.label,exercises:exs};
 });
}

/* ---------- Ernährungs-Berechnung ---------- */
function latestKg(){return state.bodyweight.length?state.bodyweight[state.bodyweight.length-1].kg:null;}
function targets(){
 const w=latestKg(),p=state.profile;
 if(!w)return null;
 const bmr=10*w+6.25*p.height-5*p.age+(p.sex==="m"?5:-161);
 const tdee=bmr*p.activity;
 let kcal=tdee;
 if(p.goal==="abnehmen")kcal-=500; else if(p.goal==="aufbau")kcal+=250; else if(p.goal==="recomp")kcal-=200;
 kcal=Math.round(kcal);
 // Body Recomp: Erhaltung mit leichtem Defizit + hohes Protein (mind. 2,0 g/kg).
 const protPerKg=p.goal==="recomp"?Math.max(2.0,state.settings.protein):state.settings.protein;
 const prot=Math.round(w*protPerKg);
 const fat=Math.round(w*0.8);
 const carbs=Math.max(0,Math.round((kcal-prot*4-fat*9)/4));
 return {kcal,p:prot,c:carbs,f:fat,fib:30,water:Math.round(w*35),
   vc:p.sex==="m"?90:75,vd:20,ca:1000,fe:p.sex==="m"?10:15,mg:p.sex==="m"?350:300,k:4000};
}
function consumedToday(){
 const day=state.foodLog[todayKey()]||[];
 const sum={};FKEYS.forEach(k=>sum[k]=0);
 day.forEach(e=>FKEYS.forEach(k=>sum[k]+=e.n[k]||0));
 sum.water=state.waterLog[todayKey()]||0;
 return sum;
}

function bar(label,cons,tgt,unit,over){
 const pct=tgt?Math.min(100,cons/tgt*100):0;

}

function viewTraining(){

 const exHtml=state.log.map((ex,ei)=>{
  const u=UNITS[ex.unit]||UNITS.kg,noW=ex.unit!=="kg",lb=state.lastBest[ex.name];
  let lbTxt="";if(lb){let t=lb.unit==="kg"?`${esc(lb.weight||"—")} kg × ${esc(lb.reps||"—")}`:`${esc(lb.reps||"—")} ${UNITS[lb.unit]?UNITS[lb.unit].r:""}`;lbTxt=`<div class="lastline">Letztes Mal: <b>${t}</b></div>`;}
  const rows=ex.sets.map((s,si)=>`<div class="setrow${s.done?' setrow--done':''}" data-row="${ei}-${si}"><span class="setnum">${si+1}</span><input class="inp" type="number" inputmode="decimal" placeholder="${noW?'—':'0'}" value="${esc(s.weight)}" ${noW?'disabled':''} data-f="weight" data-ei="${ei}" data-si="${si}"><input class="inp" type="number" inputmode="numeric" placeholder="0" value="${esc(s.reps)}" data-f="reps" data-ei="${ei}" data-si="${si}"><button class="check${s.done?' check--on':''}" data-check="${ei}-${si}">✓</button></div>`).join("");
  const steps=(ex.steps&&ex.steps.length)?`<details class="steps"><summary>Anleitung</summary><ol>${ex.steps.map(s=>`<li>${esc(s)}</li>`).join("")}</ol></details>`:"";
  return `<section class="card"><div class="ex-head"><div class="ex-name">${esc(ex.name)}</div><div class="ex-target">${ex.sets.length} × ${esc(ex.reps)}</div></div>${lbTxt}${steps}<div class="sethead"><span>Satz</span><span>${u.w}</span><span>${u.r}</span><span>✓</span></div>${rows}<button class="restbtn" data-startrest="1">⧖ Pause (${state.settings.rest}s)</button></section>`;
 }).join("");
 const {done,total}=counts();
 return `<div class="stack">
  <section class="card"><div class="dayswitch">${days}</div><div class="progress"><div class="progress-bar" id="progBar" style="width:${total?done/total*100:0}%"></div></div><div class="muted sm" id="progTxt">${done} / ${total} Sätze erledigt</div></section>

  <p class="tip">Beim Wiedereinstieg: die ersten Wochen 2–3 Wdh. „im Tank" lassen.</p>
 </div>`;
}

function trendChart(pts,target){
 const W=440,H=180,pad={t:12,r:12,b:22,l:38},xs=W-pad.l-pad.r,ys=H-pad.t-pad.b,N=pts.length;
 const data=pts.map((p,i)=>({i,...p})).filter(p=>p.has);
 const vals=data.map(p=>p.v).concat([target]);
 let min=Math.min(...vals),max=Math.max(...vals);if(min===max){min-=1;max+=1;}else{const mm=(max-min)*0.15;min-=mm;max+=mm;}min=Math.max(0,min);
 const px=i=>pad.l+(N===1?xs/2:(i/(N-1))*xs),py=v=>pad.t+ys-((v-min)/((max-min)||1))*ys;
 const line=data.map(p=>`${px(p.i).toFixed(1)},${py(p.v).toFixed(1)}`).join(" ");
 const dots=data.map(p=>`<circle cx="${px(p.i).toFixed(1)}" cy="${py(p.v).toFixed(1)}" r="2.3" fill="var(--text)"/>`).join("");
 const ty=py(target),tline=`<line x1="${pad.l}" y1="${ty.toFixed(1)}" x2="${W-pad.r}" y2="${ty.toFixed(1)}" stroke="var(--muted)" stroke-dasharray="4 3"/>`;
 const yl=[max,min].map(v=>{const y=py(v);return `<text class="axis" x="2" y="${(y+3).toFixed(1)}">${Math.round(v)}</text>`;}).join("");
 const xl=`<text class="axis" x="${px(0).toFixed(1)}" y="${H-6}">${fmtDate(pts[0].date)}</text><text class="axis" x="${px(N-1).toFixed(1)}" y="${H-6}" text-anchor="end">${fmtDate(pts[N-1].date)}</text>`;
 return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${tline}${yl}<polyline points="${line}" fill="none" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}${xl}</svg>`;
}

/* ---- Barcode-Scanner (Open Food Facts) ---- */
let scanStream=null,scanTimer=null;
function setScanStatus(t){const el=document.getElementById("scanStatus");if(el)el.textContent=t;}
async function openScanner(){
 const ov=document.getElementById("scanoverlay");ov.classList.add("on");
 const mi=document.getElementById("scanManual");if(mi)mi.value="";
 if(!("BarcodeDetector"in window)){setScanStatus("Live-Scan geht in diesem Browser nicht — bitte Barcode-Nummer unten eintippen.");return;}
 if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setScanStatus("Keine Kamera verfügbar — bitte Barcode-Nummer unten eintippen.");return;}
 setScanStatus("Barcode ruhig vor die Kamera halten …");
 try{
  scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  const v=document.getElementById("scanvideo");v.srcObject=scanStream;await v.play();
  let detector;try{detector=new BarcodeDetector({formats:["ean_13","ean_8","upc_a","upc_e","code_128"]});}catch{detector=new BarcodeDetector();}
  scanTimer=setInterval(async()=>{
   try{const codes=await detector.detect(v);if(codes&&codes.length){const code=codes[0].rawValue;stopCamera();lookupBarcode(code);}}catch{}
  },500);
 }catch(e){setScanStatus("Kamerazugriff abgelehnt oder nicht möglich — bitte Barcode-Nummer unten eintippen.");}
}
function stopCamera(){if(scanTimer){clearInterval(scanTimer);scanTimer=null;}if(scanStream){scanStream.getTracks().forEach(t=>t.stop());scanStream=null;}const v=document.getElementById("scanvideo");if(v)v.srcObject=null;}
function closeScanner(){stopCamera();const ov=document.getElementById("scanoverlay");if(ov)ov.classList.remove("on");}
async function lookupBarcode(code){
 code=String(code||"").trim();if(!code){setScanStatus("Bitte eine Barcode-Nummer eingeben.");return;}
 setScanStatus("Suche Produkt "+code+" …");
 try{
  const r=await fetch("https://world.openfoodfacts.org/api/v2/product/"+encodeURIComponent(code)+".json?fields=product_name,generic_name,brands,nutriments");
  const j=await r.json();
  if(j.status!==1||!j.product){setScanStatus("Nicht gefunden ("+code+"). Nummer prüfen oder Produkt unten manuell anlegen.");return;}
  const p=j.product,nu=p.nutriments||{};
  let name=(p.product_name||p.generic_name||("Produkt "+code)).trim();
  if(p.brands)name+=" ("+String(p.brands).split(",")[0].trim()+")";
  const kcal=nu["energy-kcal_100g"]!=null?nu["energy-kcal_100g"]:(nu["energy_100g"]?nu["energy_100g"]/4.184:0);
  const n={};FKEYS.forEach(k=>n[k]=0);
  n.kcal=Math.round(kcal||0);n.p=+(nu.proteins_100g||0);n.c=+(nu.carbohydrates_100g||0);n.f=+(nu.fat_100g||0);n.fib=+(nu.fiber_100g||0);n.vc=Math.round((nu["vitamin-c_100g"]||0)*1000);
  if(!state.customFoods.find(f=>f.name===name)){state.customFoods=[...state.customFoods,{name,n}];save(K.custom,state.customFoods);}
  closeScanner();
  state.tab="essen";state.foodPicker=true;state.scanAdded=name;render();
 }catch(e){setScanStatus("Netzwerkfehler — Internet nötig für die Produktsuche. Später erneut versuchen.");}
}
function initScanner(){
 const cb=document.getElementById("scanCloseBtn");if(cb)cb.onclick=closeScanner;
 const sb=document.getElementById("scanSearchBtn");if(sb)sb.onclick=()=>{const mi=document.getElementById("scanManual");stopCamera();lookupBarcode(mi?mi.value:"");};
 const mi=document.getElementById("scanManual");if(mi)mi.onkeydown=e=>{if(e.key==="Enter"){stopCamera();lookupBarcode(mi.value);}};
}

function svgChart(bw){

 const kgs=bw.map(b=>b.kg);let min=Math.min(...kgs),max=Math.max(...kgs);if(min===max){min-=1;max+=1;}else{const m=(max-min)*0.15;min-=m;max+=m;}
 const n=bw.length,px=i=>pad.l+(n===1?xs/2:(i/(n-1))*xs),py=v=>pad.t+ys-((v-min)/(max-min))*ys;
 const pts=bw.map((b,i)=>`${px(i).toFixed(1)},${py(b.kg).toFixed(1)}`).join(" ");
 const dots=bw.map((b,i)=>`<circle cx="${px(i).toFixed(1)}" cy="${py(b.kg).toFixed(1)}" r="2.5" fill="var(--text)"/>`).join("");
 const yl=[max,(max+min)/2,min].map(v=>{const y=py(v);return `<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="var(--hair)"/><text class="axis" x="2" y="${y+3}">${v.toFixed(0)}</text>`;}).join("");
 const xl=`<text class="axis" x="${px(0)}" y="${H-6}">${fmtDate(bw[0].date)}</text><text class="axis" x="${px(n-1)}" y="${H-6}" text-anchor="end">${fmtDate(bw[n-1].date)}</text>`;
 const diff=+(bw[n-1].kg-bw[0].kg).toFixed(1);
 return `<section class="card"><div class="eyebrow">Verlauf</div><svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">${yl}<polyline points="${pts}" fill="none" stroke="var(--text)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>${dots}${xl}</svg><div class="trend">${diff>0?'+':''}${diff} kg seit Beginn</div></section>`;
}

 const sexBtn=(v,l)=>`<button class="btn ${p.sex===v?'':'btn-ghost'} btn-sm" data-sex="${v}">${l}</button>`;
 const actOpt=[[1.2,"Wenig (Büro)"],[1.375,"Leicht aktiv"],[1.55,"Aktiv"],[1.725,"Sehr aktiv"]];
 const goalOpt=[["abnehmen","Abnehmen"],["halten","Halten"],["aufbau","Aufbau"],["recomp","Body Recomp (Fett ↓ + Muskel ↑)"]];
 return `<div class="grid2" style="margin-bottom:12px">${sexBtn("m","Mann")}${sexBtn("w","Frau")}</div>
  <div class="grid2"><div class="field"><label>Alter</label><input class="inp" type="number" id="pfAge" value="${p.age}"></div><div class="field"><label>Größe (cm)</label><input class="inp" type="number" id="pfH" value="${p.height}"></div></div>
  <div class="field"><label>Aktivität (außerhalb Training)</label><select class="sel" id="pfAct">${actOpt.map(([v,l])=>`<option value="${v}" ${p.activity==v?'selected':''}>${l}</option>`).join("")}</select></div>
  <div class="field"><label>Ziel</label><select class="sel" id="pfGoal">${goalOpt.map(([v,l])=>`<option value="${v}" ${p.goal===v?'selected':''}>${l}</option>`).join("")}</select></div>
  <p class="muted sm">Gewicht (${kg?kg+" kg":"noch nicht gesetzt"}) kommt aus dem Tab „Gewicht". ${kg?'':'<b>Bitte dort eintragen.</b>'}</p>`;
}
function planEditor(){
 const days=state.plan.map((d,di)=>{
  const ex=d.exercises.map((e,ei)=>`<div class="exrow-ed"><input class="inp" style="text-align:left" value="${esc(e.name)}" data-exname="${d.id}|${e.id}"><input class="inp" type="number" value="${e.sets}" data-exsets="${d.id}|${e.id}" title="Sätze"><input class="inp" value="${esc(e.reps)}" data-exreps="${d.id}|${e.id}" title="Wdh."></div><div class="exrow-ed2"><select class="sel" data-exunit="${d.id}|${e.id}">${Object.entries(UNITS).map(([k,v])=>`<option value="${k}" ${e.unit===k?'selected':''}>${v.lbl}</option>`).join("")}</select><div class="minirow" style="margin-left:auto"><button class="iconbtn" data-exmove="${d.id}|${e.id}|-1" ${ei===0?'disabled':''}>↑</button><button class="iconbtn" data-exmove="${d.id}|${e.id}|1" ${ei===d.exercises.length-1?'disabled':''}>↓</button><button class="iconbtn" data-exdel="${d.id}|${e.id}">✕</button></div></div>`).join("");
  return `<div class="editday"><div class="editday-top"><input class="inp" style="text-align:left" value="${esc(d.label)}" data-daylabel="${d.id}" placeholder="Tagname"><button class="iconbtn" data-daymove="${d.id}|-1" ${di===0?'disabled':''}>↑</button><button class="iconbtn" data-daymove="${d.id}|1" ${di===state.plan.length-1?'disabled':''}>↓</button></div>${ex}<div class="minirow" style="margin-top:8px;gap:8px"><button class="btn btn-ghost btn-sm" style="flex:1" data-openlib="${d.id}">+ Übung aus Liste</button><button class="btn btn-ghost btn-sm" style="flex:1" data-daydel="${d.id}" ${state.plan.length<=1?'disabled':''}>Tag löschen</button></div></div>`;
 }).join("");
 return `${days}<button class="btn" data-dayadd="1">+ Trainingstag</button>`;
}
function goalsEditor(){const s=state.settings;return `<span class="lbl-sm">Protein-Faktor (g / kg Körpergewicht)</span><div class="stepper"><button data-prot="-1">−</button><span class="val" id="protVal">${s.protein.toFixed(1)}</span><button data-prot="1">+</button></div><span class="lbl-sm">Pausen-Timer (Sekunden)</span><div class="stepper"><button data-setrest="-1">−</button><span class="val" id="restVal">${s.rest}</span><button data-setrest="1">+</button></div>`;}
function themeEditor(){const t=state.settings.theme;return `<div class="themebtns"><button class="btn ${t==='obsidian'?'':'btn-ghost'} btn-sm" data-settheme="obsidian">Dunkel</button><button class="btn ${t==='marmor'?'':'btn-ghost'} btn-sm" data-settheme="marmor">Hell</button></div>`;}
function histEditor(){if(!state.history.length)return `<p class="muted">Noch keine Einheiten.</p>`;return [...state.history].reverse().map((h,ri)=>{const i=state.history.length-1-ri;const sd=h.exercises.reduce((a,e)=>a+e.sets.filter(s=>s.done).length,0);return `<div class="histitem"><div><div class="hd-l">${esc(h.dayLabel)}</div><div class="hd-d">${fmtFull(h.date)} · ${sd} Sätze${h.note?' · Notiz':''}</div></div><button class="del" data-delhist="${i}">✕</button></div>`;}).join("");}
function dataEditor(){return `<div class="minirow" style="gap:8px"><button class="btn btn-ghost btn-sm" style="flex:1" data-download="1">Als Datei sichern</button><button class="btn btn-ghost btn-sm" style="flex:1" data-fileimport="1">Datei laden</button></div><input type="file" id="fileInput" accept="application/json,.json" style="display:none"><button class="btn btn-ghost btn-sm" data-export="1" style="margin-top:8px">Exportieren (kopieren)</button><textarea class="dataarea" id="dataArea" placeholder="Zum Importieren Text hier einfügen…" style="margin-top:10px"></textarea><div class="minirow" style="gap:8px;margin-top:8px"><button class="btn btn-ghost btn-sm" style="flex:1" data-import="1">Importieren</button><button class="btn btn-ghost btn-sm" style="flex:1" data-reset="1">Zurücksetzen</button></div><p class="muted sm" style="margin-top:10px">Daten liegen nur auf diesem Gerät. „Als Datei sichern" lädt eine Backup-Datei herunter, „Datei laden" spielt sie wieder ein.</p>`;}

function viewLibrary(){
 const dayId=state.libFor;
 let html="";
 for(const g in EXLIB){
  html+=`<div class="grouphdr">${g}</div>`;
  html+=EXLIB[g].map(e=>{
   const steps=e.slice(1);
   return `<div class="exlib-item ex-item" data-name="${esc(e[0].toLowerCase())}"><div class="between"><div class="pn" style="font-weight:600">${esc(e[0])}</div><button class="pick-add" data-libadd="${esc(e[0])}">+</button></div><details class="steps"><summary>Anleitung</summary><ol>${steps.map(s=>`<li>${esc(s)}</li>`).join("")}</ol></details></div>`;
  }).join("");
 }
 return `<div class="stack">
  <section class="card">
   <div class="between" style="margin-bottom:12px"><div class="eyebrow" style="margin:0">Übung hinzufügen zu „${esc(dayById(dayId).label)}"</div><button class="btn btn-ghost btn-sm" style="width:auto;padding:7px 12px" data-libback="1">Zurück</button></div>
   <input class="searchbar" id="exSearch" placeholder="Übung suchen …">
   <div id="exList">${html}</div>
  </section>
  <section class="card"><div class="eyebrow">Eigene Übung</div><div class="field"><label>Name</label><input class="inp" style="text-align:left" id="cxName" placeholder="z. B. Klimmzüge breit"></div><button class="btn" data-addcustomex="1">Hinzufügen</button></div>
 </div>`;
}
function addExerciseToDay(dayId,name,steps){dayById(dayId).exercises.push({id:uid(),name,sets:3,reps:"8–12",unit:"kg",steps:steps||[]});sP();}

/* ---------- Wiring ---------- */
function wire(){
 navEl.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;state.libFor=null;state.foodPicker=false;render();});
 main.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{state.tab=b.dataset.go;render();});
 // Heute
 main.querySelectorAll("[data-shift]").forEach(b=>b.onclick=()=>{state.shiftByDate={...state.shiftByDate,[todayKey()]:b.dataset.shift};save(K.shifts,state.shiftByDate);render();});
 // Training
 main.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>switchDay(b.dataset.day));
 main.querySelectorAll('input[data-f]').forEach(inp=>inp.oninput=()=>{state.log[+inp.dataset.ei].sets[+inp.dataset.si][inp.dataset.f]=inp.value;});
 main.querySelectorAll("[data-check]").forEach(btn=>btn.onclick=()=>{const [ei,si]=btn.dataset.check.split("-").map(Number);const s=state.log[ei].sets[si];s.done=!s.done;btn.classList.toggle("check--on",s.done);const r=main.querySelector(`[data-row="${ei}-${si}"]`);if(r)r.classList.toggle("setrow--done",s.done);updateProgress();if(s.done&&state.settings.rest>0)startRest();});
 main.querySelectorAll("[data-startrest]").forEach(b=>b.onclick=startRest);
 const note=document.getElementById("noteInp");if(note)note.oninput=()=>{state.note=note.value;};
 const sv=main.querySelector("[data-save]");if(sv)sv.onclick=finish;
 const pr=main.querySelector("[data-prepare]");if(pr)pr.onclick=()=>switchDay(pr.dataset.prepare);
 // Essen
 const fp=main.querySelector("[data-foodpick]");if(fp)fp.onclick=()=>{state.foodPicker=true;render();};
 const fb=main.querySelector("[data-foodback]");if(fb)fb.onclick=()=>{state.foodPicker=false;state.scanAdded=null;render();};
 main.querySelectorAll("[data-trend]").forEach(b=>b.onclick=()=>{state.trendMetric=b.dataset.trend;render();});
 const sc=main.querySelector("[data-scanopen]");if(sc)sc.onclick=openScanner;
 main.querySelectorAll("[data-delfood]").forEach(b=>b.onclick=()=>{const i=+b.dataset.delfood;const day=todayKey();const arr=[...(state.foodLog[day]||[])];arr.splice(i,1);state.foodLog={...state.foodLog,[day]:arr};save(K.food,state.foodLog);render();});
 main.querySelectorAll("[data-water]").forEach(b=>b.onclick=()=>{const day=todayKey();const cur=state.waterLog[day]||0;state.waterLog={...state.waterLog,[day]:Math.max(0,cur+ +b.dataset.water)};save(K.water,state.waterLog);render();});
 main.querySelectorAll("[data-addfood]").forEach(b=>b.onclick=()=>{const i=+b.dataset.addfood;const gi=main.querySelector(`[data-gram="${i}"]`);addFood(i,gi?parseFloat(gi.value):100);state.foodPicker=false;render();});
 main.querySelectorAll("[data-portadd]").forEach(b=>b.onclick=()=>{const[i,g]=b.dataset.portadd.split("|");addFood(+i,+g);state.foodPicker=false;render();});
 const search=document.getElementById("foodSearch");if(search)search.oninput=()=>{const q=search.value.toLowerCase();main.querySelectorAll(".food-item").forEach(it=>{it.style.display=it.dataset.name.includes(q)?"":"none";});};
 const ac=main.querySelector("[data-addcustom]");if(ac)ac.onclick=()=>{const nm=(document.getElementById("cfName").value||"").trim();if(!nm)return;const kcal=+document.getElementById("cfKcal").value||0;const p=+document.getElementById("cfP").value||0;const c=+document.getElementById("cfC").value||0;const f=+document.getElementById("cfF").value||0;const n={};FKEYS.forEach(k=>n[k]=0);n.kcal=kcal;n.p=p;n.c=c;n.f=f;state.customFoods=[...state.customFoods,{name:nm,n}];save(K.custom,state.customFoods);render();};
 // Gewicht
 const add=main.querySelector("[data-addkg]");if(add)add.onclick=addWeight;
 const kg=document.getElementById("kgInput");if(kg)kg.onkeydown=e=>{if(e.key==="Enter")addWeight();};
 main.querySelectorAll("[data-delbw]").forEach(b=>b.onclick=()=>{state.bodyweight=state.bodyweight.filter(x=>x.date!==b.dataset.delbw);save(K.weight,state.bodyweight);render();});
 // Mehr accordions
 main.querySelectorAll("[data-acc]").forEach(h=>h.onclick=()=>{state.acc[h.dataset.acc]=!state.acc[h.dataset.acc];render();});
 // profile
 main.querySelectorAll("[data-sex]").forEach(b=>b.onclick=()=>{state.profile.sex=b.dataset.sex;sPr();render();});
 const pfAge=document.getElementById("pfAge");if(pfAge)pfAge.oninput=()=>{state.profile.age=+pfAge.value||0;sPr();};
 const pfH=document.getElementById("pfH");if(pfH)pfH.oninput=()=>{state.profile.height=+pfH.value||0;sPr();};
 const pfAct=document.getElementById("pfAct");if(pfAct)pfAct.onchange=()=>{state.profile.activity=+pfAct.value;sPr();};
 const pfGoal=document.getElementById("pfGoal");if(pfGoal)pfGoal.onchange=()=>{state.profile.goal=pfGoal.value;sPr();};
 // plan
 main.querySelectorAll("[data-daylabel]").forEach(i=>i.oninput=()=>{dayById(i.dataset.daylabel).label=i.value;sP();});
 main.querySelectorAll("[data-exname]").forEach(i=>i.oninput=()=>{const[di,ei]=i.dataset.exname.split("|");const e=findEx(di,ei);if(e){e.name=i.value;sP();}});
 main.querySelectorAll("[data-exreps]").forEach(i=>i.oninput=()=>{const[di,ei]=i.dataset.exreps.split("|");const e=findEx(di,ei);if(e){e.reps=i.value;sP();}});
 main.querySelectorAll("[data-exsets]").forEach(i=>i.oninput=()=>{const[di,ei]=i.dataset.exsets.split("|");const e=findEx(di,ei);if(e){e.sets=Math.max(1,parseInt(i.value)||1);sP();}});
 main.querySelectorAll("[data-exunit]").forEach(sel=>sel.onchange=()=>{const[di,ei]=sel.dataset.exunit.split("|");const e=findEx(di,ei);if(e){e.unit=sel.value;sP();render();}});
 main.querySelectorAll("[data-openlib]").forEach(b=>b.onclick=()=>{state.libFor=b.dataset.openlib;render();});
 main.querySelectorAll("[data-exdel]").forEach(b=>b.onclick=()=>{const[di,ei]=b.dataset.exdel.split("|");const d=dayById(di);d.exercises=d.exercises.filter(x=>x.id!==ei);if(!d.exercises.length)d.exercises.push({id:uid(),name:"Neue Übung",sets:3,reps:"8–12",unit:"kg",steps:[]});sP();syncSession();render();});
 main.querySelectorAll("[data-exmove]").forEach(b=>b.onclick=()=>{const[di,ei,dir]=b.dataset.exmove.split("|");moveEx(di,ei,+dir);});
 main.querySelectorAll("[data-dayadd]").forEach(b=>b.onclick=()=>{const n=state.plan.length;state.plan.push({id:uid(),label:"Tag "+String.fromCharCode(65+n),exercises:[]});sP();render();});
 main.querySelectorAll("[data-daydel]").forEach(b=>b.onclick=()=>{if(state.plan.length<=1)return;state.plan=state.plan.filter(d=>d.id!==b.dataset.daydel);if(!state.plan.find(d=>d.id===state.nextDayId)){state.nextDayId=state.plan[0].id;save(K.nextDay,state.nextDayId);}sP();syncSession();render();});
 main.querySelectorAll("[data-daymove]").forEach(b=>b.onclick=()=>{const[di,dir]=b.dataset.daymove.split("|");moveDay(di,+dir);});
 // Plan-Assistent
 main.querySelectorAll("[data-wizfocus]").forEach(b=>b.onclick=()=>{state.wiz.focus=b.dataset.wizfocus;main.querySelectorAll("[data-wizfocus]").forEach(x=>x.classList.toggle("chip--on",x.dataset.wizfocus===state.wiz.focus));const n=document.getElementById("wizNote");if(n)n.textContent=wizNote(state.wiz.focus);});
 main.querySelectorAll("[data-wizdays]").forEach(b=>b.onclick=()=>{state.wiz.days=Math.min(4,Math.max(2,state.wiz.days+(+b.dataset.wizdays)));const v=document.getElementById("wizDaysVal");if(v)v.textContent=state.wiz.days;});
 const wm=main.querySelector("[data-wizmake]");if(wm)wm.onclick=()=>{if(!confirm("Neuen "+state.wiz.days+"-Tage-Plan erstellen? Dein aktueller Trainingsplan wird ersetzt."))return;state.plan=generatePlan(state.wiz.focus,state.wiz.days);sP();state.nextDayId=state.plan[0].id;save(K.nextDay,state.nextDayId);syncSession();state.saved=false;state.acc.wiz=false;state.acc.plan=true;render();};
 // goals/theme
 main.querySelectorAll("[data-prot]").forEach(b=>b.onclick=()=>{state.settings.protein=Math.min(2.6,Math.max(1.4,+(state.settings.protein+0.1*(+b.dataset.prot)).toFixed(1)));sS();const v=document.getElementById("protVal");if(v)v.textContent=state.settings.protein.toFixed(1);});
 main.querySelectorAll("[data-setrest]").forEach(b=>b.onclick=()=>{state.settings.rest=Math.min(600,Math.max(0,state.settings.rest+15*(+b.dataset.setrest)));sS();const v=document.getElementById("restVal");if(v)v.textContent=state.settings.rest;});
 main.querySelectorAll("[data-settheme]").forEach(b=>b.onclick=()=>{state.settings.theme=b.dataset.settheme;sS();applyTheme();render();});
 // history/data
 main.querySelectorAll("[data-delhist]").forEach(b=>b.onclick=()=>{state.history.splice(+b.dataset.delhist,1);save(K.history,state.history);render();});
 const exp=main.querySelector("[data-export]");if(exp)exp.onclick=doExport;
 const imp=main.querySelector("[data-import]");if(imp)imp.onclick=doImport;
 const dl=main.querySelector("[data-download]");if(dl)dl.onclick=doDownload;
 const fi=main.querySelector("[data-fileimport]");if(fi)fi.onclick=doFileImport;
 const rst=main.querySelector("[data-reset]");if(rst)rst.onclick=doReset;
 // library
 const lb=main.querySelector("[data-libback]");if(lb)lb.onclick=()=>{state.libFor=null;render();};
 main.querySelectorAll("[data-libadd]").forEach(b=>b.onclick=()=>{const name=b.dataset.libadd;addExerciseToDay(state.libFor,name,findExSteps(name));state.libFor=null;render();});
 const exs=document.getElementById("exSearch");if(exs)exs.oninput=()=>{const q=exs.value.toLowerCase();main.querySelectorAll(".ex-item").forEach(it=>{it.style.display=it.dataset.name.includes(q)?"":"none";});main.querySelectorAll(".grouphdr").forEach(h=>h.style.display=q?"none":"");};
 const acx=main.querySelector("[data-addcustomex]");if(acx)acx.onclick=()=>{const nm=(document.getElementById("cxName").value||"").trim();if(!nm)return;addExerciseToDay(state.libFor,nm,[]);state.libFor=null;render();};
}
function findEx(di,ei){const d=dayById(di);return d?d.exercises.find(e=>e.id===ei):null;}
function moveEx(di,ei,dir){const d=dayById(di);const i=d.exercises.findIndex(e=>e.id===ei);const j=i+dir;if(j<0||j>=d.exercises.length)return;[d.exercises[i],d.exercises[j]]=[d.exercises[j],d.exercises[i]];sP();syncSession();render();}
function moveDay(di,dir){const i=state.plan.findIndex(d=>d.id===di);const j=i+dir;if(j<0||j>=state.plan.length)return;[state.plan[i],state.plan[j]]=[state.plan[j],state.plan[i]];sP();render();}
function syncSession(){if(!state.plan.find(d=>d.id===state.trainDayId))state.trainDayId=state.plan[0].id;state.log=buildLog(state.trainDayId);}

function doExport(){const dump={};Object.values(K).forEach(k=>{const v=localStorage.getItem(k);if(v)dump[k]=v;});const txt=JSON.stringify(dump);const ta=document.getElementById("dataArea");if(ta)ta.value=txt;if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>alert("Kopiert.")).catch(()=>{});}
function doImport(){const ta=document.getElementById("dataArea");if(!ta||!ta.value.trim())return;try{applyImportObj(JSON.parse(ta.value.trim()));alert("Geladen.");}catch{alert("Text unlesbar — bitte vollständigen Export einfügen.");}}
function doReset(){if(!confirm("Wirklich ALLE Daten löschen?"))return;Object.values(K).forEach(k=>localStorage.removeItem(k));reloadState();}
function applyImportObj(obj){Object.entries(obj).forEach(([k,v])=>{if(Object.values(K).includes(k))localStorage.setItem(k,typeof v==="string"?v:JSON.stringify(v));});reloadState();}
function doDownload(){const dump={};Object.values(K).forEach(k=>{const v=localStorage.getItem(k);if(v)dump[k]=v;});const blob=new Blob([JSON.stringify(dump,null,0)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="hermes-backup-"+todayKey()+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}
function doFileImport(){const inp=document.getElementById("fileInput");if(!inp)return;inp.value="";inp.onchange=()=>{const file=inp.files&&inp.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{applyImportObj(JSON.parse(String(r.result)));alert("Geladen.");}catch{alert("Datei unlesbar — bitte eine Hermes-Backup-Datei wählen.");}};r.readAsText(file);};inp.click();}
function reloadState(){
 state.plan=load(K.plan,defaultPlan());state.settings=Object.assign({theme:"obsidian",rest:90,protein:1.9},load(K.settings,{}));
 state.profile=Object.assign({sex:"m",age:30,height:180,activity:1.375,goal:"abnehmen"},load(K.profile,{}));
 state.bodyweight=load(K.weight,[]);state.history=load(K.history,[]);state.lastBest=load(K.last,{});
 state.shiftByDate=load(K.shifts,{});state.nextDayId=load(K.nextDay,null);state.foodLog=load(K.food,{});state.waterLog=load(K.water,{});state.customFoods=load(K.custom,[]);
 if(!state.plan.length)state.plan=defaultPlan();if(!state.plan.find(d=>d.id===state.nextDayId))state.nextDayId=state.plan[0].id;
 state.trainDayId=state.nextDayId;state.log=buildLog(state.nextDayId);state.saved=false;state.note="";state.acc={};state.libFor=null;state.foodPicker=false;
 applyTheme();render();
}

/* Icon: Apple-Touch-Icon (PNG) zur Laufzeit erzeugen — iOS nutzt kein SVG-Manifest-Icon.
   Manifest + Icon für Android/Install liegen statisch als manifest.json / icon.svg vor. */
function buildIcon(size){const c=document.createElement("canvas");c.width=c.height=size;const x=c.getContext("2d");x.fillStyle="#0A0A0A";const r=size*0.22;x.beginPath();x.moveTo(r,0);x.arcTo(size,0,size,size,r);x.arcTo(size,size,0,size,r);x.arcTo(0,size,0,0,r);x.arcTo(0,0,size,0,r);x.closePath();x.fill();x.fillStyle="#F2F0EB";x.font="bold "+(size*0.6)+"px Inter, sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText("H",size*0.5,size*0.54);return c.toDataURL("image/png");}
try{document.getElementById("appleicon").href=buildIcon(192);}catch(e){console.warn(e);}

/* Service Worker für Offline-Nutzung registrieren. */
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW:",e));});}

applyTheme();initScanner();render();
</script>
